<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Channel Partners</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      min-height: 100vh;
      background: linear-gradient(135deg, #ff2f92 0%, #ff8c1a 100%);
    }

    .partners {
      text-align: center;
      padding: 50px 20px;
    }

    .partners h2 {
      font-size: 38px;
      margin-bottom: 15px;
      color: white;
    }

    .partners p {
      color: white;
      max-width: 700px;
      margin: 0 auto 40px;
      font-size: 18px;
      opacity: 0.9;
    }

    /* Responsive Layout */
    .partners-grid {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 30px;
      max-width: 1200px;
      margin: auto;
    }

    /* Cards adapt to image size */
    .partner-card {
      display: inline-flex;
      align-items: center;
      justify-content: center;

      width: fit-content;
      height: fit-content;

      padding: 18px;

      border-radius: 16px;
      border: 2px solid rgba(255,255,255,0.4);

      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(5px);

      text-decoration: none;

      transition: all 0.3s ease;
    }

    .partner-card img {
      display: block;

      width: auto;
      height: auto;

      max-width: 220px;
      max-height: 120px;

      object-fit: contain;

      filter: brightness(1.1);

      /* Rounded / blunt image edges */
      border-radius: 14px;
    }

    .partner-card:hover {
      transform: translateY(-6px) scale(1.03);

      background: rgba(255,255,255,0.12);

      box-shadow: 0 10px 25px rgba(0,0,0,0.25);
    }

    /* Mobile Responsive */
    @media (max-width: 600px) {

      .partners h2 {
        font-size: 30px;
      }

      .partners p {
        font-size: 16px;
      }

      .partner-card img {
        max-width: 160px;
        max-height: 90px;
      }
    }
  </style>
</head>

<body>

  <section class="partners">

    <h2>Brands We Offer</h2>

    <p>
      We proudly provide trusted electrical brands for industries,
      businesses, and commercial projects.
    </p>

    <div class="partners-grid">

      <a href="https://new.abb.com/" target="_blank" class="partner-card">
        <img src="abb.jpg" alt="ABB">
      </a>

      <a href="https://www.larsentoubro.com/" target="_blank" class="partner-card">
        <img src="l&t.jpg" alt="L&T">
      </a>

      <a href="https://www.bchindia.com/" target="_blank" class="partner-card">
        <img src="bch.jpg" alt="BCH">
      </a>

      <a href="https://www.se.com/in/en/" target="_blank" class="partner-card">
        <img src="snider.jpg" alt="Schneider">
      </a>

      <a href="https://www.cselectricals.com/" target="_blank" class="partner-card">
        <img src="cs.jpg" alt="C&S">
      </a>

      <a href="https://bentecindia.com/" target="_blank" class="partner-card">
        <img src="bentechbenlo.jpg" alt="Bentech Benlo">
      </a>

    </div>

  </section>

</body>
</html>
